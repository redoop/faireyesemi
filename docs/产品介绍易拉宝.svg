      <text x="52" y="26" fill="#a3a3a3" font-family="'Inter',Arial,sans-serif" font-size="22" text-anchor="middle">🏭</text>
      <text x="52" y="44" fill="#fff" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="9" font-weight="600" text-anchor="middle">工业物联</text>
      <text x="52" y="58" fill="#3F3F3F" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="7" text-anchor="middle">振动分析</text>
    </g>
    <g transform="translate(234, 24)">
