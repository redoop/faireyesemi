      <text x="55" y="26" fill="#a3a3a3" font-family="'Inter',Arial,sans-serif" font-size="22" text-anchor="middle">⌚</text>
      <text x="55" y="44" fill="#fff" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="9" font-weight="600" text-anchor="middle">可穿戴</text>
      <text x="55" y="58" fill="#3F3F3F" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="7" text-anchor="middle">健康监测</text>
