<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 1000" fill="none">
  <rect width="400" height="1000" fill="#000"/>

  <!-- Diagonal cut accent -->
  <polygon points="0,0 400,0 400,40 0,120" fill="#0A0A0A"/>
  <polygon points="0,0 400,0 400,4 0,84" fill="#8E49FA" opacity="0.15"/>

  <!-- Wafer brand mark (large background element) -->
  <circle cx="340" cy="160" r="140" stroke="rgba(142,73,250,.03)" stroke-width="1" fill="none"/>
  <circle cx="340" cy="160" r="120" stroke="rgba(142,73,250,.02)" stroke-width="0.5" fill="none"/>

  <!-- ===== HEADER ===== -->
  <g transform="translate(28, 38)">
    <path d="M 24 2 A 22 22 0 1 1 24 46 L 24 2" stroke="#8E49FA" stroke-width="2.5" fill="none"/>
    <line x1="24" y1="2" x2="24" y2="9" stroke="#8E49FA" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="31" cy="24" r="5" stroke="#8E49FA" stroke-width="1.8" fill="none"/>
    <circle cx="31" cy="24" r="2.2" fill="#8E49FA"/>

    <text x="58" y="22" fill="#fff" font-family="'Inter',Arial,sans-serif" font-size="22" font-weight="800" letter-spacing="-0.3">Faireye <tspan fill="#8E49FA">Semi</tspan></text>
    <text x="58" y="42" fill="#525252" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="12" font-weight="500" letter-spacing="5">灵瞳半导体</text>

    <line x1="0" y1="60" x2="344" y2="60" stroke="#1A1A1A" stroke-width="1"/>
  </g>

  <!-- ===== TAGLINE ===== -->
  <g transform="translate(28, 170)">
    <text x="0" y="0" fill="#8E49FA" font-family="'Inter',Arial,sans-serif" font-size="34" font-weight="900" letter-spacing="-1">为边缘智能</text>
    <text x="0" y="42" fill="#fff" font-family="'Inter',Arial,sans-serif" font-size="34" font-weight="900" letter-spacing="-0.5">注入芯力量</text>
    <text x="0" y="64" fill="#3F3F3F" font-family="'Inter',Arial,sans-serif" font-size="9" font-weight="600" letter-spacing="3">POWERING EDGE INTELLIGENCE</text>
  </g>

