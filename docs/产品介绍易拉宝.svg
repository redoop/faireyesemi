    <text x="172" y="72" fill="#8E49FA" font-family="'Inter',Arial,sans-serif" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="2">www.faireyesemi.com</text>
    <text x="172" y="86" fill="#3F3F3F" font-family="'Inter',Arial,sans-serif" font-size="8" text-anchor="middle">+86 186 1380 7209</text>
